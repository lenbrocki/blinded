name: Release

# Build, sign (Developer ID), notarize, and publish a .dmg whenever a version tag is pushed.
# Example:  git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Import Developer ID signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$MACOS_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm cert.p12

      - name: Build & sign (Release, Developer ID, hardened runtime)
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          xcodebuild -project Lumos.xcodeproj -scheme Lumos -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_HARDENED_RUNTIME=YES \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime" \
            MARKETING_VERSION="$VERSION" \
            clean build

      - name: Notarize the app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          APP="build/Build/Products/Release/Lumos.app"
          ditto -c -k --keepParent "$APP" Lumos.zip

          # Submit and capture the submission id (don't rely on --wait's exit code,
          # which is 0 even when the result is "Invalid").
          SUBMIT_JSON="$(xcrun notarytool submit Lumos.zip \
            --apple-id "$APPLE_ID" --team-id "$TEAM_ID" --password "$APPLE_APP_PASSWORD" \
            --wait --output-format json)"
          echo "$SUBMIT_JSON"
          SUBMISSION_ID="$(echo "$SUBMIT_JSON" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')"
          STATUS="$(echo "$SUBMIT_JSON" | python3 -c 'import sys,json; print(json.load(sys.stdin)["status"])')"

          # Always print the detailed notary log so rejections are diagnosable.
          echo "--- notarization log ($SUBMISSION_ID) ---"
          xcrun notarytool log "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" --team-id "$TEAM_ID" --password "$APPLE_APP_PASSWORD" || true

          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status: $STATUS"
            exit 1
          fi

          xcrun stapler staple "$APP"

      - name: Build DMG
        run: |
          set -euo pipefail
          APP="build/Build/Products/Release/Lumos.app"
          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"

          # Brand the mounted volume with the app icon, if one is committed.
          if [ -f Lumos/Lumos.icns ]; then
            cp Lumos/Lumos.icns "$STAGE/.VolumeIcon.icns"
            SetFile -a C "$STAGE" 2>/dev/null || true
          fi

          hdiutil create -volname "Lumos" -srcfolder "$STAGE" -ov -format UDZO Lumos.dmg

      - name: Notarize the DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail

          # The app inside is already notarized+stapled, so this submission is quick.
          # Notarizing+stapling the .dmg itself lets the download pass Gatekeeper directly.
          SUBMIT_JSON="$(xcrun notarytool submit Lumos.dmg \
            --apple-id "$APPLE_ID" --team-id "$TEAM_ID" --password "$APPLE_APP_PASSWORD" \
            --wait --output-format json)"
          echo "$SUBMIT_JSON"
          SUBMISSION_ID="$(echo "$SUBMIT_JSON" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')"
          STATUS="$(echo "$SUBMIT_JSON" | python3 -c 'import sys,json; print(json.load(sys.stdin)["status"])')"

          echo "--- notarization log ($SUBMISSION_ID) ---"
          xcrun notarytool log "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" --team-id "$TEAM_ID" --password "$APPLE_APP_PASSWORD" || true

          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::DMG notarization failed with status: $STATUS"
            exit 1
          fi

          xcrun stapler staple Lumos.dmg

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" Lumos.dmg \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      # Bump the cask in lenbrocki/homebrew-tap so `brew upgrade --cask lumos`
      # picks up the new release. Requires a repo secret HOMEBREW_TAP_TOKEN: a
      # PAT (fine-grained, Contents: read/write on lenbrocki/homebrew-tap, or a
      # classic token with `repo` scope). Skipped automatically if unset.
      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping Homebrew tap update."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="$(shasum -a 256 Lumos.dmg | awk '{print $1}')"
          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/lenbrocki/homebrew-tap.git" tap
          CASK="tap/Casks/lumos.rb"
          sed -i '' -E "s/^  version \".*\"/  version \"${VERSION}\"/" "$CASK"
          sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" "$CASK"
          cd tap
          if git diff --quiet; then
            echo "Cask already up to date; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/lumos.rb
          git commit -m "Update Lumos to ${VERSION}"
          git push
